services:
  postgres:
    image: postgres:16-alpine
    container_name: dtms-postgres
    ports:
      - "5434:5432"
    environment:
      POSTGRES_DB: amr_delivery_planning
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  rabbitmq:
    image: rabbitmq:3.13-management-alpine
    container_name: dtms-rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 10s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: dtms-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  jaeger:
    image: jaegertracing/all-in-one:1.57
    container_name: dtms-jaeger
    ports:
      - "16686:16686"
      - "4317:4317"
    environment:
      - COLLECTOR_OTLP_ENABLED=true

  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: dtms-api
    ports:
      - "5219:8080"
    restart: unless-stopped
    mem_limit: 2g
    # T1.3 — give the API 90 seconds to drain on SIGTERM before Docker
    # SIGKILLs it. Internally: Host.ShutdownTimeout=60s, MassTransit
    # StopTimeout=45s — so consumers finish in-flight work, the bus stops
    # accepting new messages, and HTTP requests drain before the process
    # exits. Without this Docker's default 10s gets nowhere near enough
    # for a multi-step Planning workflow (root cause of OD-0374 / OD-0375).
    stop_grace_period: 90s
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ConnectionStrings__DefaultConnection=Host=postgres;Port=5432;Database=amr_delivery_planning;Username=postgres;Password=postgres
      - ConnectionStrings__Redis=redis:6379
      - RabbitMq__Host=rabbitmq
      - RabbitMq__Username=guest
      - RabbitMq__Password=guest
      - Auth__Disable=true
      - Auth__DevTenantId=00000000-0000-0000-0000-000000000001
      # CORS origins for SignalR hubs + cross-origin browser fetches.
      # Comma-separated, scheme://host:port only (no trailing slash).
      # Override via .env to add staging/prod UI hosts.
      - Cors__HubsAllowedOrigins=${Cors__HubsAllowedOrigins:-http://localhost:3000,http://localhost:3001,http://10.204.37.65:5281,https://10.204.37.65:5281}
      # Override rate limiter for load testing — defaults to 100 req/min/IP
      - RateLimit__PermitLimit=${RateLimit__PermitLimit:-100}
      - RateLimit__WindowSeconds=${RateLimit__WindowSeconds:-60}
      - RateLimit__QueueLimit=${RateLimit__QueueLimit:-5}
      - VendorAdapter__Riot3__BaseUrl=http://10.204.212.28:12000
      - VendorAdapter__Riot3__ApiKey=${VendorAdapter__Riot3__ApiKey:-}
      # Upstream OMS shipment notification (POST /api/shipments) fired
      # when a Trip transitions Created → InProgress. BearerToken is a
      # long-lived JWT supplied by OMS ops — DO NOT commit; pass via
      # shell env var or .env file.
      - UpstreamOms__Enabled=${UpstreamOms__Enabled:-true}
      - UpstreamOms__BaseUrl=${UpstreamOms__BaseUrl:-http://10.204.37.65:5002/}
      - UpstreamOms__BearerToken=${UpstreamOms__BearerToken:-}
      - UpstreamOms__TimeoutSeconds=${UpstreamOms__TimeoutSeconds:-10}
      - Dispatch__UseOrderTemplateDispatch=${Dispatch__UseOrderTemplateDispatch:-false}
      # T1.4 — Planning workflow watchdog. Polls every 60s for orders stuck
      # at Status=Planned with no Trip (the OD-0374 / OD-0375 incident shape)
      # and re-publishes DeliveryOrderConfirmedIntegrationEventV1 so the
      # Planning consumer retries. Safe under replay because commands are
      # idempotent (T1.5). Toggle off via PlanningWatchdog__Enabled=false.
      - PlanningWatchdog__Enabled=${PlanningWatchdog__Enabled:-true}
      - PlanningWatchdog__PollIntervalSeconds=${PlanningWatchdog__PollIntervalSeconds:-60}
      - PlanningWatchdog__StaleThresholdSeconds=${PlanningWatchdog__StaleThresholdSeconds:-120}
      - Dispatch__Reconciliation__Enabled=${Dispatch__Reconciliation__Enabled:-false}
      - Dispatch__Reconciliation__PollIntervalSeconds=${Dispatch__Reconciliation__PollIntervalSeconds:-60}
      - Dispatch__Reconciliation__StaleThresholdHours=${Dispatch__Reconciliation__StaleThresholdHours:-24}
      # Inbound webhook auth (RIOT3 has no signature support — IP + URL secret).
      # Start with RequireAuth=false to log the actual remote IP in warn mode,
      # then add the IP to AllowedIPs and flip to true to enforce.
      # UrlSecrets is an array — use UrlSecrets__1 to add a second valid
      # secret during zero-downtime rotation; drop UrlSecrets__0 once RIOT3
      # has migrated to the new URL.
      - VendorAdapter__Riot3__Webhook__RequireAuth=${VendorAdapter__Riot3__Webhook__RequireAuth:-false}
      - VendorAdapter__Riot3__Webhook__AllowedIPs__0=${VendorAdapter__Riot3__Webhook__AllowedIPs__0:-}
      - VendorAdapter__Riot3__Webhook__UrlSecrets__0=${VendorAdapter__Riot3__Webhook__UrlSecrets__0:-}
      - VendorAdapter__Riot3__Webhook__UrlSecrets__1=${VendorAdapter__Riot3__Webhook__UrlSecrets__1:-}
      - OpenTelemetry__Endpoint=http://jaeger:4317
      # Dev-only placeholder secret — NOT for production (production uses Vault/KMS)
      - Jwt__Secret=dev-only-secret-min-32-chars-placeholder!

  # TMS dashboard (Next.js 16 standalone). Currently renders from mock
  # data so it doesn't depend on the .NET API — opt-in via the `prod`
  # profile so day-to-day backend work doesn't pay the build cost.
  # UI devs run `npm run dev` from frontend/ directly.
  #   docker compose --profile prod up -d frontend   # build + run UI only
  #   docker compose --profile prod up -d            # full stack
  frontend:
    profiles: ["prod"]
    build:
      context: ./frontend
      dockerfile: Dockerfile
    image: tms-frontend:latest
    container_name: tms-frontend
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - NEXT_TELEMETRY_DISABLED=1
      - DTMS_API_BASE_URL=${DTMS_API_BASE_URL:-http://10.204.212.28:15000}
      # Dev-only: skip the external auth service and mint a self-signed
      # session JWT for any submitted username. Must match the backend
      # Jwt__Secret so the token is verifiable if Auth__Disable is off.
      - DTMS_AUTH_BYPASS=${DTMS_AUTH_BYPASS:-false}
      - DTMS_JWT_SECRET=${DTMS_JWT_SECRET:-dev-only-secret-min-32-chars-placeholder!}
      # Base URL of the local .NET API for proxied feature endpoints
      # (delivery-orders etc). Defaults to the in-network compose host.
      - DTMS_BACKEND_URL=${DTMS_BACKEND_URL:-http://dtms-api:8080}
      # Browser-side URL for SignalR hubs (WebSocket from the user's
      # browser bypasses the Next.js proxy). Must match the backend CORS
      # AllowedOrigins entry (Cors__HubsAllowedOrigins env on api). For
      # dev: API exposed at host port 5219.
      - NEXT_PUBLIC_DTMS_HUBS_URL=${NEXT_PUBLIC_DTMS_HUBS_URL:-http://localhost:5219}
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:3000/"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

volumes:
  pgdata:
