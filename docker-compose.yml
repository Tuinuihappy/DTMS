services:
  postgres:
    image: postgres:16-alpine
    container_name: dtms-postgres
    ports:
      - "5434:5432"
    environment:
      POSTGRES_DB: amr_delivery_planning
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  rabbitmq:
    image: rabbitmq:3.13-management-alpine
    container_name: dtms-rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 10s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: dtms-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  jaeger:
    image: jaegertracing/all-in-one:1.57
    container_name: dtms-jaeger
    ports:
      - "16686:16686"
      - "4317:4317"
    environment:
      - COLLECTOR_OTLP_ENABLED=true

  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: dtms-api
    ports:
      - "5219:8080"
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ConnectionStrings__DefaultConnection=Host=postgres;Port=5432;Database=amr_delivery_planning;Username=postgres;Password=postgres
      - ConnectionStrings__Redis=redis:6379
      - RabbitMq__Host=rabbitmq
      - RabbitMq__Username=guest
      - RabbitMq__Password=guest
      - Auth__Disable=true
      - Auth__DevTenantId=00000000-0000-0000-0000-000000000001
      - VendorAdapter__Riot3__BaseUrl=http://10.204.212.28:12000
      - VendorAdapter__Riot3__ApiKey=${VendorAdapter__Riot3__ApiKey:-}
      - OpenTelemetry__Endpoint=http://jaeger:4317
      # Dev-only placeholder secret — NOT for production (production uses Vault/KMS)
      - Jwt__Secret=dev-only-secret-min-32-chars-placeholder!

  # Frontend (Next.js standalone). Opted in by the `prod` profile so
  # day-to-day backend work doesn't pay the build cost — UI devs run
  # `npm run dev` directly (see frontend/README.md).
  #   docker compose --profile prod up -d        # full stack incl. UI
  #   docker compose up -d                       # backend services only
  frontend:
    profiles: ["prod"]
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        # Next.js standalone bakes the rewrite target during `next build`,
        # so we have to pass DTMS_BACKEND_URL at build time. Inside the
        # compose network the API service is reachable as `api:8080`.
        DTMS_BACKEND_URL: http://api:8080
    container_name: dtms-frontend
    ports:
      - "3000:3000"
    depends_on:
      - api
    environment:
      # Same value at runtime, just in case any non-rewrite code reads
      # it (e.g. server-side fetch outside `rewrites()`).
      - DTMS_BACKEND_URL=http://api:8080
      - NODE_ENV=production

volumes:
  pgdata:
