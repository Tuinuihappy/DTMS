services:
  postgres:
    image: postgres:16-alpine
    container_name: dtms-postgres
    ports:
      - "5434:5432"
    # Phase B Step B1 — raise max_connections from alpine default 100 to 500
    # so 5 API replicas × 80-pool can coexist without "too many clients
    # already" errors at 500 VU (the symptom that surfaced in
    # 2026-06-16 REPORT.md finding #2). shared_buffers + effective_cache_size
    # tuned for a single dev/CI host with ≥4 GB RAM.
    command: >
      postgres
      -c max_connections=500
      -c shared_buffers=512MB
      -c effective_cache_size=2GB
      -c work_mem=8MB
      -c maintenance_work_mem=128MB
      -c random_page_cost=1.1
      -c effective_io_concurrency=200
    environment:
      POSTGRES_DB: amr_delivery_planning
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  # Phase B Step B3 — PgBouncer transaction-mode pool. API connects here on
  # port 6432 (NOT direct to postgres:5432) so N API replicas × client-side
  # pool can multiplex onto a much smaller server-side pool. Without this,
  # 5 API replicas × 100 NpgsqlDataSource pool = 500 connections — exactly
  # the max_connections ceiling, leaving zero headroom for psql / BI /
  # replication / admin tooling.
  #
  # Transaction-mode caveats (verified absent in DTMS codebase):
  #   - LISTEN/NOTIFY don't survive across transactions  (grep: 0 matches)
  #   - Temp tables don't survive across transactions    (grep: 0 matches)
  #   - SET LOCAL works (scoped to current transaction)
  #   - Prepared statements work iff Npgsql uses server-side prepare —
  #     enabled by default in modern Npgsql via Multiplexing/MaxAutoPrepare
  #
  # Migrator continues to use postgres direct (DDL is safer on session-mode /
  # direct connection; happens once on startup, no benefit from pooling).
  pgbouncer:
    image: edoburu/pgbouncer:latest
    container_name: dtms-pgbouncer
    ports:
      - "6432:5432"
    environment:
      # edoburu/pgbouncer uses these env var names (different from bitnami):
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: postgres
      DB_PASSWORD: postgres
      DB_NAME: amr_delivery_planning
      POOL_MODE: transaction
      MAX_CLIENT_CONN: 5000
      DEFAULT_POOL_SIZE: 50
      RESERVE_POOL_SIZE: 10
      AUTH_TYPE: scram-sha-256
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -h 127.0.0.1 -p 5432 -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Nightly pg_dump → ./backups (kept for 7 days). Restore manually with
  # `gunzip < backups/last/amr_delivery_planning-...sql.gz | psql ...`
  # Ship to S3/Backblaze in prod by adding an S3_* env block (see image docs).
  postgres-backup:
    image: prodrigestivill/postgres-backup-local:16
    container_name: dtms-postgres-backup
    restart: unless-stopped
    user: postgres:postgres
    volumes:
      - ./backups:/backups
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_DB: amr_delivery_planning
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      # Schema names match the DbContext.Schema constants (no underscores) —
      # earlier values "delivery_order" / "vendor_adapter" silently excluded
      # those schemas from every nightly dump. `bi` added because the
      # projection tables there are not recoverable from event replay.
      POSTGRES_EXTRA_OPTS: "-Z9 --schema=public --schema=auth --schema=outbox --schema=facility --schema=fleet --schema=deliveryorder --schema=planning --schema=dispatch --schema=vendoradapter --schema=bi --blobs"
      SCHEDULE: "@daily"
      BACKUP_KEEP_DAYS: 7
      BACKUP_KEEP_WEEKS: 4
      BACKUP_KEEP_MONTHS: 6
      HEALTHCHECK_PORT: 8080

  rabbitmq:
    image: rabbitmq:3.13-management-alpine
    container_name: dtms-rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 10s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: dtms-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  jaeger:
    image: jaegertracing/all-in-one:1.57
    container_name: dtms-jaeger
    ports:
      - "16686:16686"
      - "4317:4317"
    environment:
      - COLLECTOR_OTLP_ENABLED=true

  # Phase 4.3 — MinIO object storage for Manual mode POD (per ADR-015).
  # PWA receives a presigned PUT URL from the API and uploads directly to
  # MinIO so the .NET process never touches the photo bytes. Bucket
  # 'dtms-pod' is auto-created by the API on startup with a private
  # default policy (presigned-only access).
  #
  # Console UI at http://localhost:9001 (creds minioadmin/minioadmin) for
  # browsing uploads + debugging policies. NOT for production use — change
  # creds + restrict console behind reverse proxy in real deploy.
  minio:
    image: minio/minio:RELEASE.2025-01-20T14-49-07Z
    container_name: dtms-minio
    ports:
      - "9000:9000"   # S3 API
      - "9001:9001"   # Console UI
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    volumes:
      - miniodata:/data
    command: server /data --console-address ":9001"
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 5

  # One-shot migration runner. Same image as api, but invoked with
  # --migrate-only so it applies pending EF migrations + seeds then
  # exits 0. api depends on it via service_completed_successfully so
  # the main app never races against a partially-ready DB schema. If
  # this service fails, api won't start — failure is visible in
  # `docker compose up` instead of a silent crash chain.
  migrator:
    build:
      context: .
      dockerfile: Dockerfile
    image: dtms-api          # share image with api — no separate build
    container_name: dtms-migrator
    restart: "no"
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      - ASPNETCORE_ENVIRONMENT=${ASPNETCORE_ENVIRONMENT:-Development}
      - ConnectionStrings__DefaultConnection=Host=postgres;Port=5432;Database=amr_delivery_planning;Username=postgres;Password=postgres
    command: ["dotnet", "AMR.DeliveryPlanning.Api.dll", "--migrate-only"]

  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: dtms-api
    ports:
      - "5219:8080"
    restart: unless-stopped
    mem_limit: 2g
    # Probes /health/ready (postgres + redis + rabbitmq + RIOT3 not required
    # — vendors tag is separate). start_period waits 60s so the .NET app
    # has time to JIT + bind the port before the first probe runs.
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:8080/health/ready"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 60s
    # T1.3 — give the API 90 seconds to drain on SIGTERM before Docker
    # SIGKILLs it. Internally: Host.ShutdownTimeout=60s, MassTransit
    # StopTimeout=45s — so consumers finish in-flight work, the bus stops
    # accepting new messages, and HTTP requests drain before the process
    # exits. Without this Docker's default 10s gets nowhere near enough
    # for a multi-step Planning workflow (root cause of OD-0374 / OD-0375).
    stop_grace_period: 90s
    depends_on:
      postgres:
        condition: service_healthy
      pgbouncer:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
      migrator:
        condition: service_completed_successfully
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      # Phase B Step B3 — API talks to PgBouncer (container internal port 5432;
      # host port 6432 is the published mapping for external psql access),
      # NOT postgres direct. MaxPoolSize=50 caps client-side; PgBouncer
      # multiplexes onto its server-side pool of 50. "No Reset On Close=true"
      # tells Npgsql not to emit DISCARD ALL on connection return — required
      # for PgBouncer transaction-mode pooling.
      - ConnectionStrings__DefaultConnection=Host=pgbouncer;Port=5432;Database=amr_delivery_planning;Username=postgres;Password=postgres;Pooling=true;MaxPoolSize=50;No Reset On Close=true
      - ConnectionStrings__Redis=redis:6379
      - RabbitMq__Host=rabbitmq
      - RabbitMq__Username=guest
      - RabbitMq__Password=guest
      - Auth__Disable=true
      - Auth__DevTenantId=00000000-0000-0000-0000-000000000001
      # CORS origins for SignalR hubs + cross-origin browser fetches.
      # Comma-separated, scheme://host:port only (no trailing slash).
      # Override via .env to add staging/prod UI hosts.
      - Cors__HubsAllowedOrigins=${Cors__HubsAllowedOrigins:-http://localhost:3000,http://localhost:3001,http://10.204.37.65:5281,https://10.204.37.65:5281}
      # Phase F1 — Redis backplane for multi-replica SignalR. Default false
      # so single-host docker-compose stays in-memory (no Redis round-trip
      # cost). Flip to true via .env.test when running scale tests or in
      # production where API has > 1 replica. Conditional wire is at
      # src/AMR.DeliveryPlanning.Api/Program.cs around AddStackExchangeRedis.
      - SignalR__UseRedisBackplane=${SignalR__UseRedisBackplane:-false}
      # Override rate limiter for load testing — defaults to 100 req/min/IP
      - RateLimit__PermitLimit=${RateLimit__PermitLimit:-100}
      - RateLimit__WindowSeconds=${RateLimit__WindowSeconds:-60}
      - RateLimit__QueueLimit=${RateLimit__QueueLimit:-5}
      - VendorAdapter__Riot3__BaseUrl=http://10.204.212.28:12000
      - VendorAdapter__Riot3__ApiKey=${VendorAdapter__Riot3__ApiKey:-}
      # Vendor outbound kill switch. true = production-shape (Riot3OrderDispatcherAdapter,
      # real RIOT3 calls). false = NoOpOrderDispatcherAdapter (orders reach DTMS
      # Dispatched without contacting RIOT) — for load tests / dev without
      # spamming the vendor cluster. Default true so prod is safe.
      - VendorAdapter__Riot3__Enabled=${VendorAdapter__Riot3__Enabled:-true}
      # Upstream OMS shipment notification (POST /api/shipments) fired
      # when a Trip transitions Created → InProgress. BearerToken is a
      # long-lived JWT supplied by OMS ops — DO NOT commit; pass via
      # shell env var or .env file.
      - UpstreamOms__Enabled=${UpstreamOms__Enabled:-true}
      - UpstreamOms__BaseUrl=${UpstreamOms__BaseUrl:-http://10.204.37.65:5002/}
      - UpstreamOms__BearerToken=${UpstreamOms__BearerToken:-}
      - UpstreamOms__TimeoutSeconds=${UpstreamOms__TimeoutSeconds:-10}
      - Dispatch__UseOrderTemplateDispatch=${Dispatch__UseOrderTemplateDispatch:-false}
      # T1.4 — Planning workflow watchdog. Polls every 60s for orders stuck
      # at Status=Planned with no Trip (the OD-0374 / OD-0375 incident shape)
      # and re-publishes DeliveryOrderConfirmedIntegrationEventV1 so the
      # Planning consumer retries. Safe under replay because commands are
      # idempotent (T1.5). Toggle off via PlanningWatchdog__Enabled=false.
      - PlanningWatchdog__Enabled=${PlanningWatchdog__Enabled:-true}
      - PlanningWatchdog__PollIntervalSeconds=${PlanningWatchdog__PollIntervalSeconds:-60}
      - PlanningWatchdog__StaleThresholdSeconds=${PlanningWatchdog__StaleThresholdSeconds:-120}
      # T2 POC — saga state machine. When true the legacy Planning consumer
      # AND the saga both subscribe to DeliveryOrderConfirmedIntegrationEventV1
      # (dual-run shadow mode per plan section 3.3). Saga writes to its own
      # orchestration schema; consumer remains authoritative. Default false.
      - Workflow__UseSaga=${Workflow__UseSaga:-false}
      # Phase A Step A2 part 1 — outbox SKIP LOCKED fetch path. When true,
      # per-module fetch uses raw SQL FOR UPDATE SKIP LOCKED inside an
      # explicit tx (prerequisite for Phase D multi-replica workers).
      # Default false (legacy EF LINQ path).
      - Outbox__UseSkipLocked=${Outbox__UseSkipLocked:-false}
      # Phase A Step A2 part 2 — per-message publish concurrency within a
      # batch. 1 = sequential (legacy). 8 is a good starting point for
      # parallel testing — cap at the IBus connection pool size.
      - Outbox__PublishConcurrency=${Outbox__PublishConcurrency:-1}
      # Phase A Step A3 — promoted out of the hardcoded constants.
      # PollIntervalSeconds drives the drain ceiling (BatchSize/Poll = events/s
      # per module). Drop to 1 + raise BatchSize to 500 for sustained
      # 1k+ orders/s. Defaults preserve pre-flag behaviour (5s + 50).
      - Outbox__PollIntervalSeconds=${Outbox__PollIntervalSeconds:-5}
      - Outbox__BatchSize=${Outbox__BatchSize:-50}
      - Outbox__PerMessageTimeoutSeconds=${Outbox__PerMessageTimeoutSeconds:-10}
      # Phase D — gate the OutboxProcessor IHostedService. Default true so
      # plain `docker compose up` (no worker container started) still drains
      # the outbox from the api container. Override to false via .env.test
      # (or env var) when running the outbox-worker container alongside so
      # api request handling doesn't compete with outbox drain. The worker
      # container hardcodes Outbox__RunInThisProcess=true regardless.
      - Outbox__RunInThisProcess=${Outbox__RunInThisProcess:-true}
      # Safety net for dropped RIOT3 TASK_FINISHED webhooks — polls RIOT3
      # for in-flight envelope trips and reconciles via idempotent Mark*.
      # On by default so dropped webhooks self-heal within ~1 poll interval.
      - Dispatch__Reconciliation__Enabled=${Dispatch__Reconciliation__Enabled:-true}
      - Dispatch__Reconciliation__PollIntervalSeconds=${Dispatch__Reconciliation__PollIntervalSeconds:-60}
      - Dispatch__Reconciliation__StaleThresholdHours=${Dispatch__Reconciliation__StaleThresholdHours:-24}
      # Inbound webhook auth (RIOT3 has no signature support — IP + URL secret).
      # Start with RequireAuth=false to log the actual remote IP in warn mode,
      # then add the IP to AllowedIPs and flip to true to enforce.
      # UrlSecrets is an array — use UrlSecrets__1 to add a second valid
      # secret during zero-downtime rotation; drop UrlSecrets__0 once RIOT3
      # has migrated to the new URL.
      - VendorAdapter__Riot3__Webhook__RequireAuth=${VendorAdapter__Riot3__Webhook__RequireAuth:-false}
      - VendorAdapter__Riot3__Webhook__AllowedIPs__0=${VendorAdapter__Riot3__Webhook__AllowedIPs__0:-}
      - VendorAdapter__Riot3__Webhook__UrlSecrets__0=${VendorAdapter__Riot3__Webhook__UrlSecrets__0:-}
      - VendorAdapter__Riot3__Webhook__UrlSecrets__1=${VendorAdapter__Riot3__Webhook__UrlSecrets__1:-}
      - OpenTelemetry__Endpoint=http://jaeger:4317
      # HMAC signing secret for self-issued JWTs. Provide via .env (see
      # .env.example). Default is a dev-only placeholder — overriding in
      # any non-dev environment is mandatory.
      - Jwt__Secret=${Jwt__Secret:-dev-only-secret-min-32-chars-placeholder!}
      # Phase 4.3 — MinIO object storage for Manual mode POD photos
      # (per ADR-015). UseSsl false because the dev container is plain
      # HTTP; flip to true + use a public hostname in production.
      - ObjectStorage__Endpoint=${ObjectStorage__Endpoint:-minio:9000}
      - ObjectStorage__AccessKey=${ObjectStorage__AccessKey:-minioadmin}
      - ObjectStorage__SecretKey=${ObjectStorage__SecretKey:-minioadmin}
      - ObjectStorage__UseSsl=${ObjectStorage__UseSsl:-false}
      - ObjectStorage__PodBucket=${ObjectStorage__PodBucket:-dtms-pod}
      # Browser-facing URL the presigned URL embeds — different from the
      # internal endpoint when the PWA runs on the host or behind a
      # reverse proxy. Defaults to localhost:9000 for `npm run dev` flows;
      # set to a public hostname in production.
      - ObjectStorage__PublicEndpoint=${ObjectStorage__PublicEndpoint:-http://localhost:9000}
      # Phase 4.3 — Web Push (VAPID) per ADR-013. Generate once via
      # `dotnet run --project src/AMR.DeliveryPlanning.Api -- --generate-vapid-keys`
      # or any web-push-libs CLI; the keypair is non-secret on the public
      # side (PWA bakes the public key into its SW registration) and must
      # match what's served to subscribers. Subject = mailto:ops@dtms or
      # any URL/email per RFC 8292.
      - Push__Vapid__PublicKey=${Push__Vapid__PublicKey:-}
      - Push__Vapid__PrivateKey=${Push__Vapid__PrivateKey:-}
      - Push__Vapid__Subject=${Push__Vapid__Subject:-mailto:ops@dtms.local}

  # Phase D — dedicated outbox-worker container. Same image as api but with
  # Outbox:RunInThisProcess=true (the api container has this set to false
  # via the env above). Both containers run the full app (HTTP, consumers,
  # other hosted services) — only the OutboxProcessor IHostedService is
  # gated by the flag, so request handling and consumer message processing
  # can scale independently from outbox drain.
  #
  # SKIP LOCKED (A2 part 1) makes it safe to even run on multiple worker
  # replicas if needed: `docker compose up --scale outbox-worker=3`. Each
  # tick fetches a disjoint row set; no contention.
  #
  # Track C (2026-06-22) — vendor-polling hosted services (Riot3 health +
  # position + reconciliation + map/route sync + webhook notifier) are now
  # gated via Workers__VendorPollers__RunInThisProcess. The api container
  # is their single owner; this worker container skips them. Idempotent
  # background services (PlanningReconciliation, SlaRisk, FleetUtilization,
  # TopologyOverlayExpiry) still run in both — accepted because they only
  # touch local DB + are safe to run 2x.
  outbox-worker:
    image: dtms-api          # reuse the api image — no separate build
    container_name: dtms-outbox-worker
    restart: unless-stopped
    mem_limit: 1g
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:8080/health/ready"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 60s
    stop_grace_period: 90s
    depends_on:
      postgres:
        condition: service_healthy
      pgbouncer:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      redis:
        condition: service_healthy
      migrator:
        condition: service_completed_successfully
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ConnectionStrings__DefaultConnection=Host=pgbouncer;Port=5432;Database=amr_delivery_planning;Username=postgres;Password=postgres;Pooling=true;MaxPoolSize=50;No Reset On Close=true
      - ConnectionStrings__Redis=redis:6379
      - RabbitMq__Host=rabbitmq
      - RabbitMq__Username=guest
      - RabbitMq__Password=guest
      - Auth__Disable=true
      - Auth__DevTenantId=00000000-0000-0000-0000-000000000001
      # Worker container takes the same outbox tuning as the api container —
      # tested on the same .env.test flags. Override per-worker if you want
      # asymmetric tuning between api and worker (rare).
      - Outbox__UseSkipLocked=${Outbox__UseSkipLocked:-true}
      - Outbox__PublishConcurrency=${Outbox__PublishConcurrency:-8}
      - Outbox__PollIntervalSeconds=${Outbox__PollIntervalSeconds:-1}
      - Outbox__BatchSize=${Outbox__BatchSize:-500}
      - Outbox__PerMessageTimeoutSeconds=${Outbox__PerMessageTimeoutSeconds:-10}
      # The reason this container exists — outbox always runs here.
      - Outbox__RunInThisProcess=true
      # Phase F1 — worker also needs the SignalR backplane on whenever api
      # uses it. Worker's consumers push to IHubContext<T> during projector
      # work; without the backplane those broadcasts would only reach clients
      # connected to the worker (= none, worker doesn't accept hub connects).
      - SignalR__UseRedisBackplane=${SignalR__UseRedisBackplane:-false}
      # Track C (Phase D follow-up) — skip vendor-polling hosted services
      # in this container. The api container is the single owner of:
      #   Riot3HealthPollerService, VendorHealthBroadcaster,
      #   VendorHealthWebhookNotifier (Program.cs),
      #   MapStationSyncService, RouteEdgeSyncService,
      #   Riot3PositionPollerService (ModuleServiceRegistration.cs),
      #   Riot3ReconciliationService (VendorAdapterServiceRegistration.cs).
      # Without this flag, the worker doubled the RIOT3 API call rate +
      # produced 401 spam in its logs (admin JWT not provisioned here).
      - Workers__VendorPollers__RunInThisProcess=false
      # Vendor isolation flag also inherited so worker doesn't accidentally
      # call RIOT3 even if api has it disabled.
      - VendorAdapter__Riot3__Enabled=${VendorAdapter__Riot3__Enabled:-true}
      - VendorAdapter__Riot3__BaseUrl=http://10.204.212.28:12000
      - VendorAdapter__Riot3__ApiKey=${VendorAdapter__Riot3__ApiKey:-}

  # TMS dashboard (Next.js 16 standalone). Currently renders from mock
  # data so it doesn't depend on the .NET API — opt-in via the `prod`
  # profile so day-to-day backend work doesn't pay the build cost.
  # UI devs run `npm run dev` from frontend/ directly.
  #   docker compose --profile prod up -d frontend   # build + run UI only
  #   docker compose --profile prod up -d            # full stack
  frontend:
    profiles: ["prod"]
    build:
      context: ./frontend
      dockerfile: Dockerfile
    image: tms-frontend:latest
    container_name: tms-frontend
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - NEXT_TELEMETRY_DISABLED=1
      - DTMS_API_BASE_URL=${DTMS_API_BASE_URL:-http://10.204.212.28:15000}
      # Dev-only: skip the external auth service and mint a self-signed
      # session JWT for any submitted username. Must match the backend
      # Jwt__Secret so the token is verifiable if Auth__Disable is off.
      - DTMS_AUTH_BYPASS=${DTMS_AUTH_BYPASS:-false}
      - DTMS_JWT_SECRET=${DTMS_JWT_SECRET:-dev-only-secret-min-32-chars-placeholder!}
      # Base URL of the local .NET API for proxied feature endpoints
      # (delivery-orders etc). Defaults to the in-network compose host.
      - DTMS_BACKEND_URL=${DTMS_BACKEND_URL:-http://dtms-api:8080}
      # Browser-side URL for SignalR hubs (WebSocket from the user's
      # browser bypasses the Next.js proxy). Must match the backend CORS
      # AllowedOrigins entry (Cors__HubsAllowedOrigins env on api). For
      # dev: API exposed at host port 5219.
      - NEXT_PUBLIC_DTMS_HUBS_URL=${NEXT_PUBLIC_DTMS_HUBS_URL:-http://localhost:5219}
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:3000/"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

volumes:
  pgdata:
  miniodata:
