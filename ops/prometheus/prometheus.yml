# DTMS Prometheus configuration.
#
# Scrapes the API /metrics endpoint every 15 s. The API runs on the
# docker network so we use the service DNS name `api` (not localhost).
# Metrics live under the DTMS.* meter families — see PoolMetrics /
# HubMetrics / ProjectionMetrics for the actual metric names.

global:
  scrape_interval: 15s
  evaluation_interval: 15s

# Alert rules. Files are mounted at /etc/prometheus/rules via docker-compose.
# NOTE: no Alertmanager is wired yet, so alerts fire + show in the Prometheus
# UI (/alerts) but are not routed to Slack/email. Add an `alerting:` block +
# an alertmanager container to enable notification delivery.
rule_files:
  - /etc/prometheus/rules/*.yml

scrape_configs:
  - job_name: dtms-api
    metrics_path: /metrics
    static_configs:
      - targets: [api:8080]
        labels:
          service: dtms-api

  - job_name: prometheus
    static_configs:
      - targets: [localhost:9090]
