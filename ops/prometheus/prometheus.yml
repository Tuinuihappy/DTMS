# DTMS Prometheus configuration.
#
# Scrapes the API /metrics endpoint every 15 s. The API runs on the
# docker network so we use the service DNS name `api` (not localhost).
# Metrics live under the DTMS.* meter families — see PoolMetrics /
# HubMetrics / ProjectionMetrics for the actual metric names.

global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: dtms-api
    metrics_path: /metrics
    static_configs:
      - targets: [api:8080]
        labels:
          service: dtms-api

  - job_name: prometheus
    static_configs:
      - targets: [localhost:9090]
